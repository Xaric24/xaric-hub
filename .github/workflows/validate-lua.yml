name: Validate Lua

on:
  push:
    paths:
      - "**.lua"
      - ".github/workflows/validate-lua.yml"
  pull_request:
    paths:
      - "**.lua"
      - ".github/workflows/validate-lua.yml"

permissions:
  contents: read

jobs:
  syntax:
    name: Lua syntax validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20

      - name: Install parser
        run: npm install --no-save luaparse

      - name: Parse every Lua script
        run: find . -name '*.lua' -print0 | xargs -0 -n1 ./node_modules/.bin/luaparse --quiet --file

      - name: Verify hub release integrity
        run: node tests/verify-hub.js
